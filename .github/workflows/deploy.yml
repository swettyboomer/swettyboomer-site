name: Deploy to GitHub Pages

on:
  # Build & deploy on every push to main
  push:
    branches: [main]
  # ...and allow a manual run from the Actions tab
  workflow_dispatch:

# Permissions the deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish before the next starts
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site & upload artifact
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
